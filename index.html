    </div>
</div>
<script>
    const input = document.getElementById("employeeID");
    const button = document.querySelector(".submit-button");

    function lockScroll() {
    input.scrollLeft = 0;
    }

    input.addEventListener('input', lockScroll);
    input.addEventListener('scroll', lockScroll);
    input.addEventListener('keydown', lockScroll);
    input.addEventListener('keyup', lockScroll);
    input.addEventListener('focus', lockScroll);

    button.addEventListener("click", function(e) {
        e.preventDefault();
        const id = input.value.trim();

        if (/^\d{4}$/.test(id)) {
            window.location.href = `/user/${id}`;
        } else {
            alert("Please enter a valid 4-digit Employee ID.");
            input.focus();
        }
    });
</script>
<script>
    const targetMM = "caitmode";
    let index = 0;

    document.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();

        if (key.length !== 1) return;

        if (key === targetMM[index]) {
            index++;

            if (index === targetMM.length) {
                index = 0;
                activateManagerMode();
            }
        } else {
            index = 0;
        }
    });

    function activateManagerMode() {
        sessionStorage.setItem("managermode", "true");

        alert("Manager mode activated");

        document.getElementById("caitmode").classList.add("caitmode");
    }

    // optional: run on page load if already enabled in this tab session
    window.addEventListener("DOMContentLoaded", () => {
        if (sessionStorage.getItem("managermode") === "true") {
            document.getElementById("caitmode").classList.add("caitmode");
        }
    });
    function disableManagerMode() {
        sessionStorage.removeItem("managermode");
        // also remove visual effect if currently active
        document.getElementById("caitmode")?.classList.remove("caitmode");
    }
</script>
