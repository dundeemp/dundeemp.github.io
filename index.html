---
layout: default
---
<div class="header">
    <h1>WELCOME</h1>
    <h2>Culver's of Dundee</h2>
</div>

<div class="rop">
    <div class="signin">
        <h3>Please Enter your Employee ID</h3>
        <div class="signin-box">
            <div class="input-text-box">
                <input
                    class="input-text"
                    type="text"
                    id="employeeID"
                    name="employeeID"
                    maxlength="4"
                    pattern="\d{4}"
                    inputmode="numeric"
                    placeholder="0000"
                    required
                >
                <div class="separator sep1"></div>
                <div class="separator sep2"></div>
                <div class="separator sep3"></div>
            </div>
            <button class="submit-button"><i class="bi bi-arrow-right-short"></i></button>
        </div>
        <a class="shoplink" href="/shop.html">Have blue bucks?&nbsp;<b><u>See what you can get!</u></b></a>
    </div>
</div>
<div id="caitmode">
    <button onclick="disableManagerMode()">Exit Manager Mode</button>
    <h2>Manager Mode Active</h2>
    <h4>Select what you want to do:</h4>
    <a href="/shop.html">Access the Manager Shop</a>
    <a href="/manager/user-summary.html#Station_Summary">Access Training Summary</a>
    <a href="/manager/user-summary.html#Deployment_Helper">Access Deployment Helper</a>
    <a href="/manager/user-summary.html#Blue_Buck_Tracker">Access Blue Buck Tracker</a>
</div>


<script>
    const input = document.getElementById("employeeID");
    const button = document.querySelector(".submit-button");

    function lockScroll() {
    input.scrollLeft = 0;
    }

    input.addEventListener('input', lockScroll);
    input.addEventListener('scroll', lockScroll);
    input.addEventListener('keydown', lockScroll);
    input.addEventListener('keyup', lockScroll);
    input.addEventListener('focus', lockScroll);

    button.addEventListener("click", function(e) {
        e.preventDefault();
        const id = input.value.trim();

        if (/^\d{4}$/.test(id)) {
            window.location.href = `/user/${id}`;
        } else {
            alert("Please enter a valid 4-digit Employee ID.");
            input.focus();
        }
    });
</script>
<script>
    const targetMM = "caitmode";
    let index = 0;

    document.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();

        if (key.length !== 1) return;

        if (key === targetMM[index]) {
            index++;

            if (index === targetMM.length) {
                index = 0;
                activateManagerMode();
            }
        } else {
            index = 0;
        }
    });

    function activateManagerMode() {
        sessionStorage.setItem("managermode", "true");

        alert("Manager mode activated");

        document.getElementById("caitmode").classList.add("caitmode");
    }

    // optional: run on page load if already enabled in this tab session
    window.addEventListener("DOMContentLoaded", () => {
        if (sessionStorage.getItem("managermode") === "true") {
            document.getElementById("caitmode").classList.add("caitmode");
        }
    });
    function disableManagerMode() {
        sessionStorage.removeItem("managermode");
        // also remove visual effect if currently active
        document.getElementById("caitmode")?.classList.remove("caitmode");
    }
</script>
