content:
  - name: posts
    label: Employees
    path: _posts
    type: collection
    fields:
      - name: id
        label: "ID"
        type: number
        required: true
        description: "Employee #."
      - name: name
        label: "Name"
        type: string
        required: true
        description: "Employee Name: First Name + Last Name."
      - name: date
        label: "Hire Date"
        type: date
        default: ""
        options:
          format: yyyy-MM-dd
        required: true
        description: "Date this employee has hired on."
      - name: fod
        label: "Front of the House"
        type: block
        list: true
        blocks:
          - name: runner
            description: "Runner Competences."
            fields:
              - name: level_1
                label: "Tier I"
                description: "Complete the first shift as a Runner."
                type: boolean
                default: false