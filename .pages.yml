content:
  - name: users
    label: Employees
    path: _posts
    type: collection
    fields:
      - name: id
        label: "ID"
        type: number
        required: true
        description: "Employee #."
      - name: name
        label: "Name"
        type: string
        required: true
        description: "Employee Name: First Name + Last Name."
      - name: date
        label: "Hire Date"
        type: date
        default: ""
        options:
          format: yyyy-MM-dd
        required: true
        description: "Date this employee has hired on."
      - name: training_achievements
        label: "Training"
        type: block
        list: true
        blocks:
          - name: ach
            label: "Achievements"
            type: reference
            options:
              collection: achievements
              value: "{namespace}"
              label: "{fields.name} ({fields.description})"
  - name: achievements
    label: Achievements
    path: _achievements
    type: collection
    fields:
    - name: name
      type: string
      required: true
    - name: description
      type: string
      required: true
    - name: reward_title
      type: string
      required: true
    - name: reward_item
      type: string
    - name: points
      type: number
      required: true
      options:
        min: 0
    - name: type
      type: select
      required: true
      options:
        values:
          - name: training
            label: "Training"
          - name: stackable
            label: "Stackable"
          - name: Feats
            label: "Feat"
    - name: namespace
      type: string
      required: true