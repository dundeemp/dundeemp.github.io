  content:
    - name: users
      label: Employees
      path: _posts
      type: collection
      fields:
        - name: id
          label: "ID"
          type: number
          required: true
          description: "Employee #."
        - name: name
          label: "Name"
          type: string
          required: true
          description: "Employee Name: First Name + Last Name."
        - name: date
          label: "Hire Date"
          type: date
          default: ""
          options:
            format: yyyy-MM-dd
          required: true
          description: "Date this employee has hired on."
        - name: active
          label: "Active?"
          type: boolean
          default: true
          required: true
        - name: foh
          label: "Front Of House"
          type: object
          fields:
            - name: runner
              label: "👟 Runner"
              description: "A&#10;B"
              type: number
              options:
                min: 0
                max: 3
            - name: guest_attendant
              label: "🧹 Guest Attendant"
              type: number
              options:
                min: 0
                max: 3
            - name: cashier
              label: "💰 Cashier"
              type: number
              options:
                min: 0
                max: 3
            - name: drive_thru
              label: "🚗 Drive Thru"
              type: number
              options:
                min: 0
                max: 3
        - name: boh
          label: "Back Of House"
          type: object
          fields:
            - name: buns
              label: "🍔 Buns"
              type: number
              options:
                min: 0
                max: 3
            - name: grill
              label: "🫓 Grill"
              type: number
              options:
                min: 0
                max: 3
            - name: fryer
              label: "🍟 Fryer"
              type: number
              options:
                min: 0
                max: 3
        - name: boh
          label: "Desserts"
          type: object
          fields:
            - name: custard
              label: "🍦 Custard"
              type: number
              options:
                min: 0
                max: 3
        - name: other_stations
          label: "Other Stations"
          type: object
          fields:
            - name: set
              label: "🛍️ Set"
              type: number
              options:
                min: 0
                max: 3
            - name: middle
              label: "🥡 Middle"
              type: number
              options:
                min: 0
                max: 3
            - name: porting
              label: "🧼 Porting"
              type: number
              options:
                min: 0
                max: 3
            - name: food_preparation
              label: "🍲 Food Preparation"
              type: number
              options:
                min: 0
                max: 3
        - name: service
          label: "Service Milestones"
          type: object
          fields:
            - name: six_months
              label: "⏳ Service I (6 months)"
              type: boolean
              default: false
            - name: one_year
              label: "⏳ Service II (1 year)"
              type: boolean
              default: false
            - name: three_years
              label: "⏳ Service III (3 years)"
              type: boolean
              default: false
            - name: five_years
              label: "⏳ Service IV (5 years)"
              type: boolean
              default: false
            - name: ten_years
              label: "⏳ Service V (10 years)"
              type: boolean
              default: false
        - name: other_milestones
          label: "Other Milestones"
          type: object
          fields:
            - name: xmas
              label: "🎄 Christmas"
              type: boolean
              default: false
            - name: eotm
              label: "🏆 Growing Boldly"
              type: boolean
              default: false
            - name: shift_lead
              label: "⏫ Shift Lead"
              type: boolean
              default: false
            - name: manager
              label: "⏫ Manager"
              type: boolean
              default: false
            - name: jack_of_all_trades
              label: "🛠️ Jack Of All Trades"
              type: boolean
              default: false
        - name: stackable_milestones
          label: "Repeatable Milestones"
          type: object
          fields:
            - name: wingman
              label: "🤝 Wingman"
              type: number
              options:
                min: 0