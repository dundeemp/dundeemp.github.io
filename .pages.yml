content:
  - name: users
    label: Employees
    path: _posts
    type: collection
    view:
      fields: [name, id, active, date, achievements]
      default:
        sort: date
        order: desc
    fields:
      - name: id
        label: "ID"
        type: number
        required: true
        description: "Employee #."
      - name: name
        label: "Name"
        type: string
        required: true
        description: "Employee Name: First Name + Last Name."
      - name: date
        label: "Hire Date"
        type: date
        default: ""
        options:
          format: yyyy-MM-dd
        required: true
        description: "Date this employee has hired on."
      - name: active
        label: "Active?"
        type: boolean
        default: true
        required: true
      - name: achievements
        label: "Achievements"
        type: block
        list: true
        blocks:
          - name: runner
            label: "👟 Runner" 
            description: "Select the unlocked tier."
            type: number
            option:
              min: 0
              max: 3
          - name: guest_attendant
            label: "🧹 Guest Attendant" 
            description: "Select the unlocked tier."
            type: number
            option:
              min: 0
              max: 3
          - name: cashier
            label: "💰 Cashier" 
            description: "Select the unlocked tier."
            type: number
            option:
              min: 0
              max: 3
          - name: drivethru
            label: "🚗 Drive Thru" 
            description: "Select the unlocked tier."
            type: number
            option:
              min: 0
              max: 3