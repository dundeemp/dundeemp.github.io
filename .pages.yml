content:
  - name: posts
    label: Employees
    path: _posts
    type: collection
    fields:
      - name: employee_id
        label: "ID"
        type: number
        required: true
        description: "Employee #."
      - name: employee_name
        label: "Name"
        type: string
        required: true
        description: "Employee Name: First Name + Last Name."
      - name: employee_date
        label: "Hire Date"
        type: date
        default: ""
        options:
          format: yyyy-MM-dd
        required: true
        description: "Date this employee has hired on."
      - name: fod
        label: "Front of the House"
        type: block
        list: true
        blocks:
          - name: register
            label: "Register"
            fields:
              - name: videos
                label: "Register – Videos"
                type: boolean
                default: false
              - name: main
                label: "Register – Cashier Competent"
                type: boolean
                default: false